<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — {{studio.name}} Intake</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
  /* admin overrides that rely on style.css already */
  body.admin { background: #0f172a; color: #e2e8f0; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 22px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 14px; font-size: 1.05rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 6px; }
  input, textarea, select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font: inherit; }
  button { background: #2563eb; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  button.secondary { background: #334155; }
  .toast { display: none; padding: 10px; border-radius: 8px; margin: 10px 0; }
  .toast.ok { background: #14532d; color: #dcfce7; display: block; }
  .toast.err { background: #7f1d1d; color: #fee2e2; display: block; }
  .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 8px; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
  a { color: #93c5fd; }
</style>
</head>
<body class="admin">
  <div class="wrap">
    <div class="card">
      <h2>🔐 Admin setup</h2>
      <div id="auth-block">
        <p class="hint">First time? Paste a GitHub fine-grained PAT with <span class="mono">Contents: Write</span> scoped to this repo only. We store it in your browser only.</p>
        <div class="field">
          <label for="github-token">GitHub Fine-grained PAT</label>
          <input id="github-token" type="password" placeholder="github_pat_..." />
        </div>
        <div class="field">
          <label for="github-repo">Repo (owner/name)</label>
          <input id="github-repo" type="text" placeholder="you/wp_intaker" />
        </div>
        <button id="save-auth">Save admin credentials</button>
      </div>
      <p id="auth-hint" class="hint"></p>
    </div>

    <div class="card" id="editor" style="display:none;">
      <h2>Studio profile</h2>
      <div class="row">
        <div class="field"><label>Studio name</label><input id="s-studio-name" /></div>
        <div class="field"><label>Owner</label><input id="s-owner" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Support email</label><input id="s-email" type="email" /></div>
        <div class="field"><label>Reply time</label><input id="s-reply" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Primary brand color</label><input id="s-primary" type="color" style="height:42px;padding:2px;" /></div>
        <div class="field"><label>Dark</label><input id="s-dark" type="color" style="height:42px;padding:2px;" /></div>
      </div>
    </div>

    <div class="card" id="editor2" style="display:none;">
      <h2>Pricing quick-edit</h2>
      <div class="row">
        <div class="field"><label>Base amount ($)</label><input id="s-base" type="number" /></div>
        <div class="field"><label>Per extra page ($)</label><input id="s-extra" type="number" /></div>
      </div>
    </div>

    <div class="card" id="editor3" style="display:none;">
      <h2>Form settings</h2>
      <div class="field"><label>FormSubmit owner email (this receives the form + CC)</label><input id="s-form-email" type="email" /></div>
      <div class="field" style="margin-top:12px;">
        <button id="save-settings">Save settings.json</button>
      </div>
      <div id="save-toast" class="toast"></div>
    </div>

    <div class="card" id="preview" style="display:none;">
      <h2>Preview links</h2>
      <p class="hint">After saving, your public intake form lives at:</p>
      <p class="mono" id="preview-url"></p>
    </div>
  </div>

<script src="../js/admin.js"></script>
</body>
</html>
