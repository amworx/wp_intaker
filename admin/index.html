<!DOCTYPE html>
<html lang="en" style="color-scheme: light dark;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>" />
    <title>AM Worx — Admin Dashboard</title>
    <script>
        // Apply dark mode before paint to prevent flash
        (function(){try{if(localStorage.getItem('amworx_darkmode')==='true')document.documentElement.classList.add('dark')}catch(e){}})();
    </script>
    <script>
        // =====================================================================
        //  CONFIG — Edit these values to customize the dashboard
        // =====================================================================
        const CONFIG = {
            APP_NAME: 'AM Worx',
            APP_NAME_LONG: 'AM Worx Studio',
            ADMIN_PASSCODE: 'amworx2026',
            APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbznDI1u6GjuOlO5rFMnp2BkzapEHy1ak34yLvpb09AdGImwMiwEa-TAFL4jn_XT_TiHEQ/exec',
            FORM_URL: 'https://amworx.github.io/wp_intaker/',
            STORAGE_KEYS: {
                AUTH: 'amworx_admin',
                DARKMODE: 'amworx_darkmode'
            },
            AUTO_REFRESH_MS: 60000,
            TOAST_DURATION_MS: 3000,
            SESSION_EXPIRY_HOURS: 24,
            MAX_FILE_SIZE_MB: 25,
            DATE_FORMAT: { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' } // passed to toLocaleDateString
        };
        // Update title from config
        // Page title will be updated dynamically by Alpine init
        document.title = CONFIG.APP_NAME + ' — Admin Dashboard';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        [x-cloak] { display: none !important; }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
            .skeleton { animation: none !important; }
            .slide-panel { animation: none !important; }
            .fade-up { animation: none !important; opacity: 1 !important; }
            .toast-bubble { animation: none !important; }
            .pulse-dot::after { display: none; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }

        /* ── Skeleton shimmer ── */
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px; }
        .dark .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── Pulse dot ── */
        .pulse-dot { position: relative; }
        .pulse-dot::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: currentColor; animation: pulse-ring 2s cubic-bezier(0.4,0,0.6,1) infinite; opacity: 0.4; }
        @keyframes pulse-ring { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.8); opacity: 0; } }

        /* ── Slide-in panel ── */
        .slide-panel { animation: slideIn 0.25s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }

        /* ── Fade-up ── */
        .fade-up { animation: fadeUp 0.4s ease-out both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up-1 { animation-delay: 0.05s; }
        .fade-up-2 { animation-delay: 0.1s; }
        .fade-up-3 { animation-delay: 0.15s; }
        .fade-up-4 { animation-delay: 0.2s; }

        /* ── Tabular numbers ── */
        .tabular-nums { font-variant-numeric: tabular-nums; }

        /* ── Glass morphism ── */
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15,23,42,0.7); }

        /* ── Toast ── */
        .toast-bubble { animation: toastPop 0.35s cubic-bezier(0.16,1,0.3,1); }
        @keyframes toastPop { from { transform: translateY(24px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* ── Row actions ── */
        .row-actions { opacity: 0; transition: opacity 0.15s; }
        tr:hover .row-actions { opacity: 1; }
        @media (hover: none) { .row-actions { opacity: 1; } }

        /* ── Avatar ── */
        .avatar { @apply w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0; }

        /* ── Body scroll lock ── */
        body.panel-open { overflow: hidden; }

        /* ── Focus ── */
        *:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; border-radius: 4px; }

        /* ── Touch ── */
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        /* ── Balance headings ── */
        h1, h2, h3, h4 { text-wrap: balance; }

        /* ── Better table rows ── */
        .table-striped tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }
        .dark .table-striped tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
    </style>
</head>
<body>

<div x-data="dashboardApp()"
     x-cloak
     @keydown.escape.window="if (detailRow) closeDetail(); if (deleteTarget) deleteTarget = null"
     class="min-h-screen bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <!-- ======================== LOGIN GATE ======================== -->
    <div x-show="!authenticated"
         x-transition:enter="transition duration-300"
         class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-gray-50 to-blue-50 dark:from-gray-950 dark:to-gray-900 p-4 z-50">
        <div class="w-full max-w-sm bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/50 dark:border-gray-700/50 p-8 fade-up">
            <div class="text-center mb-6">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20" aria-hidden="true">
                    <i class="fas fa-shield-halved text-white text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100" x-text="'Welcome to ' + (settingsForm.APP_NAME || CONFIG.APP_NAME)"></h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter passcode to manage submissions.</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm" aria-hidden="true"></i>
                    <input type="password" x-model="passcode" @keydown.enter="login()" placeholder="Passcode" class="input-field pl-10 text-center tracking-[0.3em]" maxlength="20" autocomplete="current-password" spellcheck="false" />
                </div>
                <p x-show="loginError" x-text="loginError" class="text-red-600 dark:text-red-400 text-sm text-center animate-pulse" role="alert"></p>
                <button @click="login()" class="btn-primary w-full py-3 text-base shadow-lg shadow-blue-500/20 hover:shadow-xl hover:shadow-blue-500/30 transition-all duration-200">
                    <i class="fas fa-lock-open" aria-hidden="true"></i> Unlock Dashboard
                </button>
            </div>
        </div>
    </div>

    <!-- ======================== MAIN LAYOUT ======================== -->
    <template x-if="authenticated">
        <div class="flex h-screen overflow-hidden">

            <!-- ====== SIDEBAR ====== -->
            <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
                   class="fixed inset-y-0 left-0 z-40 w-64 bg-gradient-to-b from-gray-900 to-gray-950 dark:from-gray-950 dark:to-black border-r border-gray-800/50 transition-all duration-300 ease-out lg:translate-x-0 lg:static lg:z-auto flex flex-col shadow-2xl lg:shadow-none">
                <!-- Logo -->
                <div class="flex items-center gap-3 px-5 h-16 border-b border-gray-800/50">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center flex-shrink-0 shadow-lg shadow-blue-500/20">
                        <i class="fas fa-pen-ruler text-white text-xs" aria-hidden="true"></i>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-white tracking-tight" x-text="settingsForm.APP_NAME || CONFIG.APP_NAME"></div>
                        <div class="text-[10px] text-gray-500 font-medium">Admin Dashboard</div>
                    </div>
                </div>

                <!-- Nav -->
                <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1" aria-label="Main navigation">
                    <a href="#" @click.prevent="currentView='dashboard'"
                       :class="currentView==='dashboard' ? 'sidebar-link active' : 'sidebar-link text-gray-400'"
                       class="sidebar-link group relative">
                        <span class="relative z-10 flex items-center gap-3">
                            <i class="fas fa-grid-2 w-5 text-center text-sm" aria-hidden="true"></i> Dashboard
                        </span>
                        <span x-show="currentView==='dashboard'" class="absolute inset-0 rounded-lg bg-white/10"></span>
                    </a>
                    <a href="#" @click.prevent="currentView='submissions'"
                       :class="currentView==='submissions' ? 'sidebar-link active' : 'sidebar-link text-gray-400'"
                       class="sidebar-link group relative">
                        <span class="relative z-10 flex items-center gap-3">
                            <i class="fas fa-list-check w-5 text-center text-sm" aria-hidden="true"></i> Submissions
                        </span>
                        <span x-show="currentView==='submissions'" class="absolute inset-0 rounded-lg bg-white/10"></span>
                        <span x-show="submissions.length > 0"
                              class="relative z-10 ml-auto bg-blue-600 text-white text-[10px] font-bold rounded-full min-w-[20px] h-5 flex items-center justify-center px-1.5 shadow-sm"
                              x-text="submissions.length"></span>
                    </a>

                    <a href="#" @click.prevent="currentView='settings'"
                       :class="currentView==='settings' ? 'sidebar-link active' : 'sidebar-link text-gray-400'"
                       class="sidebar-link group relative">
                        <span class="relative z-10 flex items-center gap-3">
                            <i class="fas fa-sliders w-5 text-center text-sm" aria-hidden="true"></i> Settings
                        </span>
                        <span x-show="currentView==='settings'" class="absolute inset-0 rounded-lg bg-white/10"></span>
                    </a>

                    <div class="pt-4 mt-4 border-t border-gray-800/50 space-y-1">
                        <a :href="settingsForm.FORM_URL || CONFIG.FORM_URL" target="_blank" class="sidebar-link text-gray-500 hover:text-gray-300" aria-label="Open intake form in new tab">
                            <i class="fas fa-external-link w-5 text-center text-sm" aria-hidden="true"></i> View Form
                        </a>
                        <a href="#" @click.prevent="logout()" class="sidebar-link text-gray-500 hover:text-red-400">
                            <i class="fas fa-right-from-bracket w-5 text-center text-sm" aria-hidden="true"></i> Log Out
                        </a>
                    </div>
                </nav>

                <!-- Bottom status -->
                <div class="px-4 py-3 border-t border-gray-800/50">
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <span class="w-1.5 h-1.5 rounded-full" :class="connected ? 'bg-emerald-500' : 'bg-red-500'"></span>
                        <span x-text="connected ? 'Connected' : 'Disconnected'"></span>
                        <span class="ml-auto" x-text="autoRefreshLabel"></span>
                    </div>
                </div>
            </aside>

            <!-- Mobile overlay -->
            <div x-show="sidebarOpen"
                 @click="sidebarOpen = false"
                 x-transition:enter="transition duration-200"
                 x-transition:enter-start="opacity-0"
                 x-transition:enter-end="opacity-100"
                 x-transition:leave="transition duration-150"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="fixed inset-0 bg-black/60 z-30 lg:hidden backdrop-blur-sm"></div>

            <!-- ====== CONTENT AREA ====== -->
            <div class="flex-1 flex flex-col min-w-0">

                <!-- ====== HEADER ====== -->
                <header class="h-16 glass border-b border-gray-200/60 dark:border-gray-800/60 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-20 transition-colors duration-200">
                    <div class="flex items-center gap-3">
                        <button @click="sidebarOpen = !sidebarOpen" aria-label="Toggle sidebar" class="lg:hidden p-2 rounded-xl text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all active:scale-95">
                            <i class="fas fa-bars text-lg" aria-hidden="true"></i>
                        </button>
                        <div>
                            <h1 class="text-base font-semibold text-gray-900 dark:text-gray-100 flex items-center gap-2">
                                <span x-text="pageTitle"></span>
                                <span x-show="currentView==='submissions' && submissions.length > 0"
                                      class="text-xs font-normal text-gray-400 dark:text-gray-500 bg-gray-100 dark:bg-gray-800 rounded-full px-2 py-0.5"
                                      x-text="submissions.length"></span>
                            </h1>
                            <p class="text-xs text-gray-500 dark:text-gray-400 flex items-center gap-1.5" x-text="subhead"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <!-- Live indicator -->
                        <span class="hidden sm:inline-flex items-center gap-1.5 rounded-full bg-blue-50 dark:bg-blue-500/10 px-3 py-1.5 text-xs font-medium text-blue-700 dark:text-blue-400 border border-blue-200/50 dark:border-blue-500/20">
                            <span class="w-2 h-2 rounded-full bg-blue-600 pulse-dot" aria-hidden="true"></span>
                            <span x-text="submissions.length + ' submission' + (submissions.length !== 1 ? 's' : '')"></span>
                        </span>
                        <!-- Dark mode -->
                        <button @click="toggleDark()" aria-label="Toggle dark mode" class="p-2 rounded-xl text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all active:scale-95">
                            <i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas text-lg transition-transform duration-300" :class="darkMode ? 'rotate-90' : ''" aria-hidden="true"></i>
                        </button>
                        <!-- Refresh -->
                        <button @click="loadSubmissions()" aria-label="Refresh submissions" class="p-2 rounded-xl text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all active:scale-95">
                            <i class="fas fa-rotate" :class="{'animate-spin': loading}" aria-hidden="true"></i>
                        </button>
                    </div>
                </header>

                <!-- ====== MAIN ====== -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-6 scroll-smooth">

                    <!-- ── SKELETON LOADING ── -->
                    <div x-show="loading" class="space-y-5 max-w-5xl">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                            <template x-for="i in 4" :key="i">
                                <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5">
                                    <div class="flex items-center justify-between mb-4">
                                        <div class="skeleton h-3 w-16"></div>
                                        <div class="skeleton h-9 w-9 rounded-xl"></div>
                                    </div>
                                    <div class="skeleton h-8 w-24 mb-2"></div>
                                    <div class="skeleton h-3 w-32"></div>
                                </div>
                            </template>
                        </div>
                        <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5">
                            <div class="flex items-center justify-between mb-5">
                                <div class="skeleton h-4 w-40"></div>
                                <div class="skeleton h-3 w-16"></div>
                            </div>
                            <div class="space-y-4">
                                <template x-for="i in 4" :key="i">
                                    <div class="flex items-center gap-4">
                                        <div class="skeleton h-8 w-8 rounded-full"></div>
                                        <div class="flex-1 space-y-2">
                                            <div class="skeleton h-3 w-3/4"></div>
                                            <div class="skeleton h-3 w-1/2"></div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- ── ERROR ── -->
                    <div x-show="loadError && !loading" class="max-w-lg mx-auto mt-8 fade-up" role="alert">
                        <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-red-200 dark:border-red-900/50 p-8 text-center shadow-lg">
                            <div class="w-16 h-16 rounded-2xl bg-red-100 dark:bg-red-500/10 flex items-center justify-center mx-auto mb-4" aria-hidden="true">
                                <i class="fas fa-wifi-slash text-2xl text-red-500" aria-hidden="true"></i>
                            </div>
                            <h3 class="font-semibold text-gray-900 dark:text-gray-100 text-lg">Connection Lost</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 leading-relaxed" x-text="loadError"></p>
                            <button @click="loadSubmissions()" class="mt-5 btn-primary inline-flex shadow-lg shadow-blue-500/20 hover:shadow-xl hover:shadow-blue-500/30 transition-all">
                                <i class="fas fa-rotate" aria-hidden="true"></i> Retry Connection
                            </button>
                        </div>
                    </div>

                    <!-- ── DASHBOARD VIEW ── -->
                    <div x-show="!loading && !loadError && currentView === 'dashboard'" class="max-w-6xl">
                        <!-- Stats grid -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:border-blue-200 dark:hover:border-blue-900 transition-all duration-200 group fade-up fade-up-1">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Total</span>
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-100 to-blue-50 dark:from-blue-500/20 dark:to-blue-600/10 flex items-center justify-center text-blue-600 dark:text-blue-400 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="fas fa-inbox"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100 stat-number" x-text="submissions.length">0</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">All time submissions</div>
                            </div>
                            <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:border-amber-200 dark:hover:border-amber-900 transition-all duration-200 group fade-up fade-up-2">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">New</span>
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-100 to-amber-50 dark:from-amber-500/20 dark:to-amber-600/10 flex items-center justify-center text-amber-600 dark:text-amber-400 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="fas fa-clock"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100 stat-number" x-text="newCount">0</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Awaiting review</div>
                            </div>
                            <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:border-emerald-200 dark:hover:border-emerald-900 transition-all duration-200 group fade-up fade-up-3">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Reviewed</span>
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-100 to-emerald-50 dark:from-emerald-500/20 dark:to-emerald-600/10 flex items-center justify-center text-emerald-600 dark:text-emerald-400 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="fas fa-check"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100 stat-number" x-text="reviewedCount">0</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Completed reviews</div>
                            </div>
                            <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 p-5 hover:shadow-lg hover:border-purple-200 dark:hover:border-purple-900 transition-all duration-200 group fade-up fade-up-4">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Est. Revenue</span>
                                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-100 to-purple-50 dark:from-purple-500/20 dark:to-purple-600/10 flex items-center justify-center text-purple-600 dark:text-purple-400 group-hover:scale-110 transition-transform" aria-hidden="true"><i class="fas fa-dollar-sign"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100 stat-number" x-text="totalRevenue">$0</div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Combined estimate</div>
                            </div>
                        </div>

                        <!-- Recent table -->
                        <div class="bg-white dark:bg-gray-800/50 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm hover:shadow-md transition-shadow duration-200">
                            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-gray-800">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-100 to-blue-50 dark:from-blue-500/20 dark:to-blue-600/10 flex items-center justify-center text-blue-600 dark:text-blue-400" aria-hidden="true"><i class="fas fa-table-list text-sm"></i></div>
                                    <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Recent Submissions</h3>
                                </div>
                                <button @click="currentView='submissions'" class="text-xs font-medium text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center gap-1">
                                    View All <i class="fas fa-arrow-right text-[10px]" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="overflow-x-auto">
                                <!-- Table -->
                                <table class="w-full text-sm" x-show="submissions.length > 0">
                                    <thead>
                                        <tr class="border-b border-gray-50 dark:border-gray-800">

</div>

<script>
    // =====================================================================
    //  Application
    // =====================================================================
    function dashboardApp() {
        return {
            // Auth
            authenticated: false,
            passcode: '',
            loginError: '',

            // UI
            sidebarOpen: false,
            darkMode: false,
            currentView: 'dashboard',
            loading: true,
            loadError: '',
            connected: false,

            // Data
            submissions: [],
            searchQuery: '',
            detailRow: null,
            currentDetailIdx: null,
            deleteTarget: null,

            // Toast
            toast: { show: false, message: '', type: '' },
            toastTimer: null,

            // Auto-refresh
            refreshInterval: null,
            nextRefresh: null,

            // Settings (loaded from localStorage, fallback to CONFIG)
            settingsForm: {},
            settingsSaved: false,
            saving: false,

            // ── Field label mapping ──
            FIELD_LABELS: [
                'Timestamp','Full Name','Business Name','Email','Phone',
                'Domain','Domain Idea','Web Hosting','Business Email','Email Accounts','Setup Help',
                'Business Description','Website Type','Pages','Other Pages',
                'Features','Logo','Text Content','Photos','Brand Colors','Inspiration Links',
                'Timeline','Maintenance','Budget Range','Extra Notes','Estimated Total',
                'Uploaded Files','Status'
            ],

            // ── Field groups for detail panel ──
            FIELD_GROUPS: [
                { label: 'Personal', indices: [1,2,3,4] },
                { label: 'Domain & Hosting', indices: [5,6,7,8,9,10] },
                { label: 'Business', indices: [11] },
                { label: 'Website', indices: [12,13,14] },
                { label: 'Features', indices: [15] },
                { label: 'Design & Content', indices: [16,17,18,19,20] },
                { label: 'Timeline', indices: [21,22] },
                { label: 'Budget', indices: [23,24,25] },
                { label: 'Files', indices: [26] },
            ],

            // ── Computed ──
            get pageTitle() {
                if (this.currentView === 'dashboard') return 'Dashboard';
                if (this.currentView === 'settings') return 'Settings';
                return 'Submissions';
            },
            get subhead() {
                if (this.currentView === 'dashboard') return 'Overview of all submissions';
                if (this.currentView === 'settings') return 'Configure your dashboard';
                return this.searchQuery
                    ? this.filteredSubmissions.length + ' results'
                    : this.submissions.length + ' total';
            },
            get newCount() {
                return this.submissions.filter(r => !r[27] || r[27] !== 'Reviewed').length;
            },
            get reviewedCount() {
                return this.submissions.filter(r => r[27] === 'Reviewed').length;
            },
            get totalRevenue() {
                const total = this.submissions.reduce((s, r) => {
                    const v = r[24]; if (!v) return s;
                    return s + (parseFloat(String(v).replace(/[^0-9.]/g,'')) || 0);
                }, 0);
                return '$' + total;
            },
            get recentSubmissions() {
                return this.submissions.slice(0, 5);
            },
            get filteredSubmissions() {
                if (!this.searchQuery.trim()) return this.submissions;
                const q = this.searchQuery.toLowerCase().trim();
                return this.submissions.filter(r =>
                    (r[1]||'').toLowerCase().includes(q) ||
                    (r[2]||'').toLowerCase().includes(q) ||
                    (r[3]||'').toLowerCase().includes(q)
                );
            },
            get autoRefreshLabel() {
                if (!this.nextRefresh) return '';
                const secs = Math.max(0, Math.round((this.nextRefresh - Date.now()) / 1000));
                if (secs <= 0) return 'refreshing…';
                return secs + 's';
            },

            // ── Detail groups (filtered) ──
            get detailGroups() {
                if (!this.detailRow) return [];
                const groups = [];
                this.FIELD_GROUPS.forEach(g => {
                    const fields = g.indices
                        .map(i => ({ label: this.FIELD_LABELS[i] || 'Field ' + i, value: this.detailRow[i] }))
                        .filter(f => f.value !== undefined && f.value !== null && String(f.value).trim() !== '');
                    if (fields.length > 0) groups.push({ label: g.label, fields });
                });
                return groups;
            },

            // ── Init ──
            async init() {
                // Load settings from localStorage
                this.loadSettings();
                document.title = (this.settingsForm.APP_NAME || CONFIG.APP_NAME) + ' — Admin Dashboard';

                const saved = sessionStorage.getItem(this.settingsForm.STORAGE_AUTH);
                if (saved === '1') {
                    this.authenticated = true;
                    await this.loadSubmissions();
                } else {
                    this.loading = false;
                }
                const dm = localStorage.getItem(this.settingsForm.STORAGE_DARKMODE);
                if (dm === 'true') { this.darkMode = true; document.documentElement.classList.add('dark'); }
                // Auto-refresh countdown
                const refreshMs = (this.settingsForm.AUTO_REFRESH_SEC || 60) * 1000;
                this.refreshInterval = setInterval(() => { this.nextRefresh = this.nextRefresh || Date.now() + refreshMs; }, 1000);
                setInterval(() => { if (this.authenticated) this.loadSubmissions(); this.nextRefresh = Date.now() + refreshMs; }, refreshMs);
            },

            login() {
                if (this.passcode === this.settingsForm.ADMIN_PASSCODE) {
                    sessionStorage.setItem(this.settingsForm.STORAGE_AUTH,'1');
                    this.authenticated = true; this.loginError = '';
                    this.loadSubmissions();
                } else {
                    this.loginError = 'Incorrect passcode'; this.passcode = '';
                }
            },
            logout() {
                sessionStorage.removeItem(this.settingsForm.STORAGE_AUTH);
                this.authenticated = false; this.submissions = []; this.detailRow = null;
            },
            toggleDark() {
                this.darkMode = !this.darkMode;
                document.documentElement.classList.toggle('dark');
                localStorage.setItem(this.settingsForm.STORAGE_DARKMODE, this.darkMode);
            },

            // ── Settings ──
            loadSettings() {
                const saved = localStorage.getItem('amworx_dashboard_settings');
                const defaults = {
                    APP_NAME: CONFIG.APP_NAME,
                    ADMIN_PASSCODE: CONFIG.ADMIN_PASSCODE,
                    APPS_SCRIPT_URL: CONFIG.APPS_SCRIPT_URL,
                    STUDIO_EMAIL: CONFIG.APP_NAME_LONG.toLowerCase().replace(/\s+/g,'') + '@gmail.com',
                    FORM_URL: CONFIG.FORM_URL,
                    AUTO_REFRESH_SEC: 60,
                    TOAST_DURATION_MS: CONFIG.TOAST_DURATION_MS,
                    SESSION_EXPIRY_HOURS: 24,
                    DATE_STYLE: 'short',
                    STORAGE_AUTH: CONFIG.STORAGE_KEYS.AUTH,
                    STORAGE_DARKMODE: CONFIG.STORAGE_KEYS.DARKMODE
                };
                try {
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        this.settingsForm = { ...defaults, ...parsed };
                    } else {
                        this.settingsForm = defaults;
                    }
                } catch(e) {
                    this.settingsForm = defaults;
                }
            },
            saveSettings() {
                this.saving = true; this.settingsSaved = false;
                try {
                    // Ensure storage keys always use defaults
                    this.settingsForm.STORAGE_AUTH = CONFIG.STORAGE_KEYS.AUTH;
                    this.settingsForm.STORAGE_DARKMODE = CONFIG.STORAGE_KEYS.DARKMODE;
                    localStorage.setItem('amworx_dashboard_settings', JSON.stringify(this.settingsForm));
                    this.settingsSaved = true;
                    document.title = (this.settingsForm.APP_NAME || CONFIG.APP_NAME) + ' — Admin Dashboard';
                    setTimeout(() => { this.settingsSaved = false; }, 2000);
                    this.showToast('Settings saved','ok');
                } catch(e) {
                    this.showToast('Failed to save settings','err');
                } finally {
                    this.saving = false;
                }
            },
            resetSettings() {
                if (confirm('Reset all settings to defaults? This cannot be undone.')) {
                    localStorage.removeItem('amworx_dashboard_settings');
                    this.loadSettings();
                    this.showToast('Settings reset to defaults','ok');
                }
            },

            // ── API ──
            async loadSubmissions() {
                this.loading = true; this.loadError = '';
                try {
                    const resp = await fetch(this.settingsForm.APPS_SCRIPT_URL + '?action=list');
                    const text = await resp.text();
                    let data;
                    try { data = JSON.parse(text); } catch(e) { throw new Error('Invalid server response'); }
                    if (data.success === undefined && data.status === 'OK')
                        throw new Error('Old deployment — update with latest docs/intake-email-backend.gs');
                    if (!data.success) throw new Error(data.error || 'Unknown error');
                    this.submissions = data.rows || [];
                    this.connected = true;
                    this.loading = false;
                    this.nextRefresh = Date.now() + (this.settingsForm.AUTO_REFRESH_SEC || 60) * 1000;
                } catch (err) {
                    this.loadError = err.message; this.connected = false; this.loading = false;
                }
            },

            formatDate(ts) {
                if (!ts) return '—';
                try {
                    const d = new Date(ts);
                    if (isNaN(d.getTime())) return ts;
                    const style = this.settingsForm.DATE_STYLE || 'short';
                    const opts = style === 'long'
                        ? { month:'long', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }
                        : style === 'medium'
                        ? { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }
                        : { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' };
                    return d.toLocaleDateString('en-US', opts);
                }
                catch(e) { return ts; }
            },
            getOriginalIndex(row) { return this.submissions.indexOf(row); },
            openDetail(idx) { this.currentDetailIdx = idx; this.detailRow = this.submissions[idx]; document.body.classList.add('panel-open'); },
            closeDetail() { this.detailRow = null; this.currentDetailIdx = null; document.body.classList.remove('panel-open'); },

            async toggleReviewed(idx) {
                try {
                    const resp = await fetch(this.settingsForm.APPS_SCRIPT_URL + '?action=reviewed&index=' + idx);
                    const data = await resp.json();
                    if (data.success) { this.showToast('Status updated','ok'); await this.loadSubmissions(); this.closeDetail(); }
                    else { this.showToast('Failed: ' + (data.error||'unknown'),'err'); }
                } catch(err) { this.showToast('Network error','err'); }
            },
            async quickToggle(idx) {
                try {
                    const resp = await fetch(this.settingsForm.APPS_SCRIPT_URL + '?action=reviewed&index=' + idx);
                    const data = await resp.json();
                    if (data.success) { this.showToast('Status updated','ok'); await this.loadSubmissions(); }
                    else { this.showToast('Failed: ' + (data.error||'unknown'),'err'); }
                } catch(err) { this.showToast('Network error','err'); }
            },
            confirmDelete(idx) { this.deleteTarget = idx; },
            async doDelete() {
                const idx = this.deleteTarget; this.deleteTarget = null;
                try {
                    const resp = await fetch(this.settingsForm.APPS_SCRIPT_URL + '?action=delete&index=' + idx);
                    const data = await resp.json();
                    if (data.success) { this.showToast('Deleted','ok'); await this.loadSubmissions(); this.closeDetail(); }
                    else { this.showToast('Failed: ' + (data.error||'unknown'),'err'); }
                } catch(err) { this.showToast('Network error','err'); }
            },

            showToast(msg, type) {
                if (this.toastTimer) clearTimeout(this.toastTimer);
                this.toast = { show: true, message: msg, type: type||'' };
                this.toastTimer = setTimeout(() => { this.toast.show = false; }, this.settingsForm.TOAST_DURATION_MS || CONFIG.TOAST_DURATION_MS);
            }
        };
    }
</script>

</body>
</html>
