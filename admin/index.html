<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AM Worx — Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors; }
        .sidebar-link:hover { @apply bg-white/10; }
        .sidebar-link.active { @apply bg-white/10 text-white; }
        .stat-card { @apply bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-5 transition-shadow hover:shadow-md; }
        .badge-new { @apply inline-flex items-center gap-1 rounded-full bg-blue-50 dark:bg-blue-500/10 px-2.5 py-0.5 text-xs font-medium text-blue-700 dark:text-blue-400; }
        .badge-reviewed { @apply inline-flex items-center gap-1 rounded-full bg-emerald-50 dark:bg-emerald-500/10 px-2.5 py-0.5 text-xs font-medium text-emerald-700 dark:text-emerald-400; }
        .btn-primary { @apply inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 transition-colors; }
        .btn-secondary { @apply inline-flex items-center justify-center gap-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors; }
        .btn-danger { @apply inline-flex items-center justify-center gap-2 rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition-colors; }
        .input-field { @apply w-full rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-colors; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Status dot pulse */
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Slide-in animation for detail panel */
        .slide-in { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Toast animation */
        .toast-enter { animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards; }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>

<div x-data="dashboardApp()" x-cloak class="min-h-screen bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

    <!-- ======================== LOGIN GATE ======================== -->
    <div x-show="!authenticated" class="fixed inset-0 flex items-center justify-center bg-gray-50 dark:bg-gray-950 p-4 z-50">
        <div class="w-full max-w-sm bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700 p-8">
            <div class="text-center mb-6">
                <div class="w-14 h-14 rounded-xl bg-blue-600 flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-shield-halved text-white text-2xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100">Admin Access</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter passcode to manage submissions.</p>
            </div>
            <div class="space-y-4">
                <input type="password" x-model="passcode" @keydown.enter="login()" placeholder="Passcode" class="input-field text-center text-lg tracking-[0.3em]" maxlength="20" />
                <p x-show="loginError" x-text="loginError" class="text-red-600 dark:text-red-400 text-sm text-center"></p>
                <button @click="login()" class="btn-primary w-full py-3">
                    <i class="fas fa-lock-open"></i> Unlock Dashboard
                </button>
            </div>
        </div>
    </div>

    <!-- ======================== MAIN LAYOUT ======================== -->
    <template x-if="authenticated">
        <div class="flex h-screen overflow-hidden">

            <!-- ====== SIDEBAR ====== -->
            <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="fixed inset-y-0 left-0 z-40 w-64 bg-gray-900 dark:bg-gray-950 border-r border-gray-800 transition-transform duration-200 lg:translate-x-0 lg:static lg:z-auto flex flex-col">
                <!-- Logo -->
                <div class="flex items-center gap-3 px-5 h-16 border-b border-gray-800">
                    <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-pen-ruler text-white text-sm"></i>
                    </div>
                    <div>
                        <div class="text-sm font-bold text-white">AM Worx</div>
                        <div class="text-[10px] text-gray-400">Admin Dashboard</div>
                    </div>
                </div>

                <!-- Nav -->
                <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">
                    <a href="#" @click.prevent="currentView='dashboard'" :class="currentView==='dashboard' ? 'sidebar-link active' : 'sidebar-link text-gray-400'" class="sidebar-link">
                        <i class="fas fa-grid-2 w-5 text-center text-sm"></i> Dashboard
                    </a>
                    <a href="#" @click.prevent="currentView='submissions'" :class="currentView==='submissions' ? 'sidebar-link active' : 'sidebar-link text-gray-400'">
                        <i class="fas fa-list-check w-5 text-center text-sm"></i> Submissions
                        <span x-show="submissions.length > 0" class="ml-auto bg-blue-600 text-white text-[10px] font-bold rounded-full px-2 py-0.5" x-text="submissions.length"></span>
                    </a>
                    <div class="pt-4 mt-4 border-t border-gray-800">
                        <a href="https://amworx.github.io/wp_intaker/" target="_blank" class="sidebar-link text-gray-400">
                            <i class="fas fa-external-link w-5 text-center text-sm"></i> View Form
                        </a>
                        <a href="#" @click.prevent="logout()" class="sidebar-link text-gray-400">
                            <i class="fas fa-right-from-bracket w-5 text-center text-sm"></i> Log Out
                        </a>
                    </div>
                </nav>
            </aside>

            <!-- Overlay for mobile -->
            <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 bg-black/50 z-30 lg:hidden"></div>

            <!-- ====== CONTENT AREA ====== -->
            <div class="flex-1 flex flex-col min-w-0">

                <!-- ====== HEADER ====== -->
                <header class="h-16 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-20">
                    <div class="flex items-center gap-3">
                        <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800">
                            <i class="fas fa-bars text-lg"></i>
                        </button>
                        <div>
                            <h1 class="text-base font-semibold text-gray-900 dark:text-gray-100" x-text="pageTitle"></h1>
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="subhead"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <!-- Dark mode toggle -->
                        <button @click="darkMode = !darkMode; $el.closest('html').classList.toggle('dark')" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle theme">
                            <i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas text-lg"></i>
                        </button>
                        <!-- Stats badge -->
                        <span class="hidden sm:inline-flex items-center gap-1.5 rounded-full bg-blue-50 dark:bg-blue-500/10 px-3 py-1.5 text-xs font-medium text-blue-700 dark:text-blue-400">
                            <span class="w-2 h-2 rounded-full bg-blue-600 pulse-dot"></span>
                            <span x-text="submissions.length + ' submissions'"></span>
                        </span>
                    </div>
                </header>

                <!-- ====== MAIN ====== -->
                <main class="flex-1 overflow-y-auto p-4 lg:p-6">

                    <!-- ── LOADING ── -->
                    <div x-show="loading" class="flex flex-col items-center justify-center py-20">
                        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p class="mt-4 text-sm text-gray-500 dark:text-gray-400">Loading submissions...</p>
                    </div>

                    <!-- ── ERROR ── -->
                    <div x-show="loadError && !loading" class="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-800 rounded-xl p-6 text-center max-w-lg mx-auto">
                        <i class="fas fa-circle-exclamation text-3xl text-red-500 mb-3"></i>
                        <h3 class="font-semibold text-red-800 dark:text-red-400">Failed to Load</h3>
                        <p class="text-sm text-red-600 dark:text-red-300 mt-1" x-text="loadError"></p>
                        <button @click="loadSubmissions()" class="mt-4 btn-primary text-sm">
                            <i class="fas fa-rotate"></i> Retry
                        </button>
                        <div class="mt-4 p-3 bg-red-100 dark:bg-red-900/30 rounded-lg text-xs text-left text-red-700 dark:text-red-300">
                            <p class="font-medium mb-1">💡 Quick fix:</p>
                            <p>1. Go to <strong>script.google.com</strong> → open the project</p>
                            <p>2. Replace all code with the latest from <strong>docs/intake-email-backend.gs</strong></p>
                            <p>3. Deploy → New deployment → Web app → <strong>Anyone</strong></p>
                            <p>4. Copy new URL and update it in <strong>admin/index.html</strong> (APPS_SCRIPT_URL)</p>
                        </div>
                    </div>

                    <!-- ── DASHBOARD VIEW ── -->
                    <div x-show="!loading && !loadError && currentView === 'dashboard'">
                        <!-- Stats -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div class="stat-card">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Total</span>
                                    <div class="w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-500/20 flex items-center justify-center text-blue-600 dark:text-blue-400"><i class="fas fa-inbox"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100" x-text="submissions.length"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">All time submissions</div>
                            </div>
                            <div class="stat-card">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">New</span>
                                    <div class="w-9 h-9 rounded-lg bg-amber-100 dark:bg-amber-500/20 flex items-center justify-center text-amber-600 dark:text-amber-400"><i class="fas fa-clock"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100" x-text="newCount"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Awaiting review</div>
                            </div>
                            <div class="stat-card">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Reviewed</span>
                                    <div class="w-9 h-9 rounded-lg bg-emerald-100 dark:bg-emerald-500/20 flex items-center justify-center text-emerald-600 dark:text-emerald-400"><i class="fas fa-check"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100" x-text="reviewedCount"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">Completed reviews</div>
                            </div>
                            <div class="stat-card">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Est. Revenue</span>
                                    <div class="w-9 h-9 rounded-lg bg-purple-100 dark:bg-purple-500/20 flex items-center justify-center text-purple-600 dark:text-purple-400"><i class="fas fa-dollar-sign"></i></div>
                                </div>
                                <div class="text-3xl font-bold text-gray-900 dark:text-gray-100" x-text="totalRevenue"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">From all submissions</div>
                            </div>
                        </div>

                        <!-- Recent submissions table -->
                        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700">
                            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200 dark:border-gray-700">
                                <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Recent Submissions</h3>
                                <button @click="currentView='submissions'" class="text-xs text-blue-600 dark:text-blue-400 hover:underline">View all</button>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm" x-show="submissions.length > 0">
                                    <thead>
                                        <tr class="border-b border-gray-100 dark:border-gray-700">
                                            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                                            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Business</th>
                                            <th class="text-left px-5 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden sm:table-cell">Date</th>
                                            <th class="text-right px-5 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden md:table-cell">Estimate</th>
                                            <th class="text-center px-5 py-3 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(row, idx) in recentSubmissions" :key="idx">
                                            <tr @click="openDetail(idx)" class="border-b border-gray-50 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer transition-colors">
                                                <td class="px-5 py-3">
                                                    <div class="font-medium text-gray-900 dark:text-gray-100" x-text="row[1] || '—'"></div>
                                                </td>
                                                <td class="px-5 py-3 text-gray-600 dark:text-gray-400" x-text="row[2] || '—'"></td>
                                                <td class="px-5 py-3 text-gray-500 dark:text-gray-400 hidden sm:table-cell">
                                                    <span x-text="formatDate(row[0])"></span>
                                                </td>
                                                <td class="px-5 py-3 text-right text-gray-700 dark:text-gray-300 hidden md:table-cell">
                                                    <span x-show="row[24]" x-text="'$' + String(row[24]).replace('$','')"></span>
                                                    <span x-show="!row[24]" class="text-gray-400">—</span>
                                                </td>
                                                <td class="px-5 py-3 text-center">
                                                    <span x-show="row[27] === 'Reviewed'" class="badge-reviewed"><i class="fas fa-check-circle text-[10px]"></i> Reviewed</span>
                                                    <span x-show="!row[27] || row[27] !== 'Reviewed'" class="badge-new"><span class="w-1.5 h-1.5 rounded-full bg-blue-600 pulse-dot"></span> New</span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                                <div x-show="submissions.length === 0" class="py-12 text-center">
                                    <i class="fas fa-inbox text-3xl text-gray-300 dark:text-gray-600 mb-3"></i>
                                    <p class="text-sm text-gray-500 dark:text-gray-400">No submissions yet</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ── SUBMISSIONS VIEW ── -->
                    <div x-show="!loading && !loadError && currentView === 'submissions'">
                        <!-- Toolbar -->
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
                            <div class="relative flex-1 max-w-md w-full">
                                <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="text" x-model="searchQuery" placeholder="Search name, business, email..." class="input-field pl-10" />
                            </div>
                            <div class="flex items-center gap-2">
                                <button @click="loadSubmissions()" class="btn-secondary text-sm px-3 py-2">
                                    <i class="fas fa-rotate" :class="{'animate-spin': loading}"></i>
                                </button>
                                <span class="text-xs text-gray-500 dark:text-gray-400" x-text="filteredSubmissions.length + ' / ' + submissions.length + ' results'"></span>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead>
                                        <tr class="bg-gray-50 dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-700">
                                            <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                                            <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Business</th>
                                            <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden md:table-cell">Email</th>
                                            <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden sm:table-cell">Date</th>
                                            <th class="text-right px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider hidden lg:table-cell">Estimate</th>
                                            <th class="text-left px-5 py-3.5 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                                        <template x-for="(row, idx) in filteredSubmissions" :key="idx">
                                            <tr @click="openDetail(getOriginalIndex(row))" class="hover:bg-gray-50 dark:hover:bg-gray-700/30 cursor-pointer transition-colors">
                                                <td class="px-5 py-3.5">
                                                    <div class="font-medium text-gray-900 dark:text-gray-100" x-text="row[1] || '—'"></div>
                                                </td>
                                                <td class="px-5 py-3.5 text-gray-600 dark:text-gray-400" x-text="row[2] || '—'"></td>
                                                <td class="px-5 py-3.5 text-gray-500 dark:text-gray-400 hidden md:table-cell" x-text="row[3] || '—'"></td>
                                                <td class="px-5 py-3.5 text-gray-500 dark:text-gray-400 hidden sm:table-cell whitespace-nowrap" x-text="formatDate(row[0])"></td>
                                                <td class="px-5 py-3.5 text-right text-gray-700 dark:text-gray-300 hidden lg:table-cell">
                                                    <span x-show="row[24]" class="font-medium" x-text="'$' + String(row[24]).replace('$','')"></span>
                                                    <span x-show="!row[24]" class="text-gray-400">—</span>
                                                </td>
                                                <td class="px-5 py-3.5">
                                                    <span x-show="row[27] === 'Reviewed'" class="badge-reviewed"><i class="fas fa-check-circle text-[10px]"></i> Reviewed</span>
                                                    <span x-show="!row[27] || row[27] !== 'Reviewed'" class="badge-new"><span class="w-1.5 h-1.5 rounded-full bg-blue-600 pulse-dot"></span> New</span>
                                                </td>
                                            </tr>
                                        </template>
                                        <tr x-show="filteredSubmissions.length === 0">
                                            <td colspan="6" class="px-5 py-12 text-center text-gray-500 dark:text-gray-400">
                                                <i class="fas fa-search text-2xl mb-2 block text-gray-300 dark:text-gray-600"></i>
                                                <span x-text="searchQuery ? 'No results for &quot;' + searchQuery + '&quot;' : 'No submissions yet'"></span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </main>
            </div>
        </div>
    </template>

    <!-- ======================== DETAIL SLIDE-IN PANEL ======================== -->
    <template x-if="detailRow">
        <div class="fixed inset-0 z-50 flex justify-end">
            <div @click="closeDetail()" class="absolute inset-0 bg-black/40"></div>
            <div class="relative w-full max-w-lg bg-white dark:bg-gray-800 h-full overflow-y-auto shadow-2xl slide-in">
                <!-- Header -->
                <div class="sticky top-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex items-center justify-between z-10">
                    <div>
                        <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100" x-text="detailRow[1] || 'Anonymous'"></h2>
                        <p class="text-xs text-gray-500 dark:text-gray-400" x-text="detailRow[2] ? detailRow[2] + ' · ' + formatDate(detailRow[0]) : formatDate(detailRow[0])"></p>
                    </div>
                    <button @click="closeDetail()" class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="fas fa-xmark text-lg"></i>
                    </button>
                </div>

                <div class="px-6 py-5 space-y-5">
                    <!-- Status badge at top -->
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Submission Details</span>
                        <span x-show="detailRow[27] === 'Reviewed'" class="badge-reviewed"><i class="fas fa-check-circle"></i> Reviewed</span>
                        <span x-show="!detailRow[27] || detailRow[27] !== 'Reviewed'" class="badge-new"><span class="w-1.5 h-1.5 rounded-full bg-blue-600 pulse-dot"></span> New</span>
                    </div>

                    <!-- Fields -->
                    <template x-for="(field, fi) in detailFields" :key="fi">
                        <div x-show="field.value" class="pb-3 border-b border-gray-100 dark:border-gray-700 last:border-0">
                            <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1" x-text="field.label"></div>
                            <div class="text-sm text-gray-900 dark:text-gray-100 whitespace-pre-wrap break-words" x-text="field.value"></div>
                        </div>
                    </template>

                    <!-- Action buttons -->
                    <div class="flex flex-wrap gap-2 pt-2 sticky bottom-0 bg-white dark:bg-gray-800 py-4 border-t border-gray-200 dark:border-gray-700 -mx-6 px-6">
                        <button @click="toggleReviewed(currentDetailIdx)" class="btn-secondary text-sm">
                            <i :class="detailRow[27] === 'Reviewed' ? 'fa-rotate' : 'fa-check'" class="fas"></i>
                            <span x-text="detailRow[27] === 'Reviewed' ? 'Mark as New' : 'Mark Reviewed'"></span>
                        </button>
                        <button @click="confirmDelete(currentDetailIdx)" class="btn-danger text-sm">
                            <i class="fas fa-trash-can"></i> Delete
                        </button>
                        <button @click="closeDetail()" class="btn-secondary text-sm ml-auto">
                            <i class="fas fa-xmark"></i> Close
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ======================== DELETE CONFIRM MODAL ======================== -->
    <div x-show="deleteTarget !== null" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div @click="deleteTarget = null" class="absolute inset-0 bg-black/50"></div>
        <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl p-6 max-w-sm w-full border border-gray-200 dark:border-gray-700">
            <div class="text-center mb-4">
                <div class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-500/20 flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-trash-can text-red-600 dark:text-red-400 text-xl"></i>
                </div>
                <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100">Delete Submission?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">This will permanently remove this submission from the Sheet.</p>
            </div>
            <div class="flex gap-2">
                <button @click="deleteTarget = null" class="btn-secondary flex-1">Cancel</button>
                <button @click="doDelete()" class="btn-danger flex-1">
                    <i class="fas fa-trash-can"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- ======================== TOAST ======================== -->
    <div x-show="toast.show" x-transition.duration.300 class="fixed bottom-6 right-6 z-50">
        <div :class="toast.type === 'ok' ? 'bg-emerald-700' : toast.type === 'err' ? 'bg-red-700' : 'bg-gray-800'" class="flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg text-white text-sm">
            <i :class="toast.type === 'ok' ? 'fa-check-circle' : toast.type === 'err' ? 'fa-circle-exclamation' : 'fa-info-circle'" class="fas"></i>
            <span x-text="toast.message"></span>
        </div>
    </div>

</div>

<script>
    // =====================================================================
    //  Alpine.js Application
    // =====================================================================
    function dashboardApp() {
        return {
            // Auth
            authenticated: false,
            passcode: '',
            loginError: '',
            ADMIN_PASSCODE: 'amworx2026', // ← CHANGE THIS

            // UI state
            sidebarOpen: false,
            darkMode: false,
            currentView: 'dashboard',
            loading: true,
            loadError: '',

            // Data
            submissions: [],
            searchQuery: '',

            // Detail panel
            detailRow: null,
            currentDetailIdx: null,

            // Delete
            deleteTarget: null,

            // Toast
            toast: { show: false, message: '', type: '' },
            toastTimer: null,

            // Config
            APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbznDI1u6GjuOlO5rFMnp2BkzapEHy1ak34yLvpb09AdGImwMiwEa-TAFL4jn_XT_TiHEQ/exec',
            FIELD_LABELS: [
                'Timestamp', 'Full Name', 'Business Name', 'Email', 'Phone',
                'Domain', 'Domain Idea', 'Web Hosting', 'Business Email', 'Email Accounts', 'Setup Help',
                'Business Description',
                'Website Type', 'Pages', 'Other Pages',
                'Features',
                'Logo', 'Text Content', 'Photos', 'Brand Colors', 'Inspiration Links',
                'Timeline', 'Maintenance',
                'Budget Range', 'Extra Notes', 'Estimated Total',
                'Uploaded Files', 'Status'
            ],

            // ── Computed ──
            get pageTitle() {
                if (this.currentView === 'dashboard') return 'Dashboard';
                return 'Submissions';
            },
            get subhead() {
                if (this.currentView === 'dashboard') return 'Overview of all submissions';
                return this.searchQuery
                    ? this.filteredSubmissions.length + ' results for "' + this.searchQuery + '"'
                    : this.submissions.length + ' total submissions';
            },
            get newCount() {
                return this.submissions.filter(r => !r[27] || r[27] !== 'Reviewed').length;
            },
            get reviewedCount() {
                return this.submissions.filter(r => r[27] === 'Reviewed').length;
            },
            get totalRevenue() {
                const total = this.submissions.reduce((sum, r) => {
                    const v = r[24];
                    if (!v) return sum;
                    const num = parseFloat(String(v).replace(/[^0-9.]/g, ''));
                    return sum + (isNaN(num) ? 0 : num);
                }, 0);
                return '$' + total;
            },
            get recentSubmissions() {
                return this.submissions.slice(0, 5);
            },
            get filteredSubmissions() {
                if (!this.searchQuery.trim()) return this.submissions;
                const q = this.searchQuery.toLowerCase().trim();
                return this.submissions.filter(r =>
                    (r[1] || '').toLowerCase().includes(q) ||
                    (r[2] || '').toLowerCase().includes(q) ||
                    (r[3] || '').toLowerCase().includes(q)
                );
            },

            // ── Methods ──
            async init() {
                // Check saved auth
                const saved = sessionStorage.getItem('amworx_admin');
                if (saved === '1') {
                    this.authenticated = true;
                    await this.loadSubmissions();
                } else {
                    this.loading = false;
                }

                // Dark mode from localStorage
                const dm = localStorage.getItem('amworx_darkmode');
                if (dm === 'true') {
                    this.darkMode = true;
                    document.querySelector('html').classList.add('dark');
                }

                // Auto-refresh every 60s
                setInterval(() => {
                    if (this.authenticated) this.loadSubmissions();
                }, 60000);
            },

            login() {
                if (this.passcode === this.ADMIN_PASSCODE) {
                    sessionStorage.setItem('amworx_admin', '1');
                    this.authenticated = true;
                    this.loginError = '';
                    this.loadSubmissions();
                } else {
                    this.loginError = 'Incorrect passcode';
                    this.passcode = '';
                }
            },

            logout() {
                sessionStorage.removeItem('amworx_admin');
                this.authenticated = false;
                this.submissions = [];
                this.detailRow = null;
            },

            async loadSubmissions() {
                this.loading = true;
                this.loadError = '';

                try {
                    const url = this.APPS_SCRIPT_URL + '?action=list';
                    const resp = await fetch(url, { method: 'GET' });
                    const text = await resp.text();
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        throw new Error('Invalid JSON response from server. Raw: ' + text.substring(0, 100));
                    }

                    // Handle old-style endpoint that returns {status: "OK"} without success field
                    if (data.success === undefined && data.status === 'OK') {
                        // Old deployment — still returns status OK but no data
                        throw new Error(
                            'Apps Script is running an old version without Sheet storage.\n' +
                            'Please update it with the latest code from docs/intake-email-backend.gs and re-deploy.'
                        );
                    }

                    if (!data.success) {
                        throw new Error(data.error || 'Unknown API error');
                    }

                    this.submissions = data.rows || [];
                    this.loading = false;
                } catch (err) {
                    console.error('Load error:', err);
                    this.loadError = err.message || 'Failed to load submissions';
                    this.loading = false;
                }
            },

            formatDate(ts) {
                if (!ts) return '—';
                // Try to format ISO-ish dates
                try {
                    const d = new Date(ts);
                    if (isNaN(d.getTime())) return ts;
                    return d.toLocaleDateString('en-US', {
                        month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch (e) {
                    return ts;
                }
            },

            // When filtering, we need the original index
            getOriginalIndex(row) {
                return this.submissions.indexOf(row);
            },

            openDetail(idx) {
                this.currentDetailIdx = idx;
                this.detailRow = this.submissions[idx];
            },

            closeDetail() {
                this.detailRow = null;
                this.currentDetailIdx = null;
            },

            get detailFields() {
                if (!this.detailRow) return [];
                const skipStatus = (val, label) => {
                    // Show Status only if it has value
                    if (label === 'Status') return false;
                    return val !== undefined && val !== null && String(val).trim() !== '';
                };
                return this.detailRow
                    .map((val, i) => ({ label: this.FIELD_LABELS[i] || 'Field ' + i, value: val }))
                    .filter(f => f.value !== undefined && f.value !== null && String(f.value).trim() !== '');
            },

            async toggleReviewed(idx) {
                try {
                    const url = this.APPS_SCRIPT_URL + '?action=reviewed&index=' + idx;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.success) {
                        this.showToast('Status updated', 'ok');
                        await this.loadSubmissions();
                        this.closeDetail();
                    } else {
                        this.showToast('Failed: ' + (data.error || 'unknown'), 'err');
                    }
                } catch (err) {
                    this.showToast('Network error: ' + err.message, 'err');
                }
            },

            confirmDelete(idx) {
                this.deleteTarget = idx;
            },

            async doDelete() {
                const idx = this.deleteTarget;
                this.deleteTarget = null;
                try {
                    const url = this.APPS_SCRIPT_URL + '?action=delete&index=' + idx;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.success) {
                        this.showToast('Submission deleted', 'ok');
                        await this.loadSubmissions();
                        this.closeDetail();
                    } else {
                        this.showToast('Failed: ' + (data.error || 'unknown'), 'err');
                    }
                } catch (err) {
                    this.showToast('Network error: ' + err.message, 'err');
                }
            },

            showToast(msg, type) {
                if (this.toastTimer) clearTimeout(this.toastTimer);
                this.toast = { show: true, message: msg, type: type || '' };
                this.toastTimer = setTimeout(() => {
                    this.toast.show = false;
                }, 3000);
            }
        };
    }

    // Persist dark mode on toggle
    document.addEventListener('alpine:init', () => {
        // nothing extra needed
    });
</script>

</body>
</html>
